**Alteração B no `default.html` (no menu `<nav>`):**
Modifique o laço `{% for %}` para incluir a tag `<i>` do ícone com um pequeno espaçamento (`margin-right`).

```html
    <nav class="nav-links" aria-label="External profiles">
        {% for x in site.data.nav %}
            <a href="{{ x.link }}" target="_blank" rel="noopener">
                {% if x.icon %}<i class="{{ x.icon }}" style="margin-right: 6px; font-size: 1.1em;"></i>{% endif %}{{ x.name }}
            </a>
        {% endfor %}
    </nav>
