name: Update Publications from Semantic Scholar

on:
  schedule:
    # Roda toda segunda-feira às 6h UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  update-pubs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install scholarly pyyaml

      - name: Fetch publications and write YAML
        run: python scripts/fetch_publications.py
        env:
          SCHOLAR_ID: ${{ secrets.SCHOLAR_ID }}

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/publications.yml
          git diff --cached --quiet || git commit -m "chore: atualiza publicações do Google Scholar [skip ci]"
          git push
